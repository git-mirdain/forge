[package]
name = "git-forge"
version = "0.0.0"
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Local-first infrastructure for Git forges."

[[bin]]
name = "git-forge"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
clap_mangen = { workspace = true }
git-forge-comment = { workspace = true }
git-forge-core = { workspace = true }
git-forge-issue = { workspace = true }
git-forge-review = { workspace = true }
git-forge-release = { workspace = true }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = { workspace = true }

[lints]
workspace = true
